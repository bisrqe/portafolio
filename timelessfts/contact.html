  <header class="page-hero">
    <h1>Get in Touch</h1>
  </header>

  <main class="contact-wrapper">
    <p>Commission a shoot, ask a question, or just say hi.</p>

    <!--
      ACTION: Replace the Formspree endpoint below with your own.
      1. Sign up free at https://formspree.io
      2. Create a new form (target: bismarck@bisrqe.com)
      3. Copy the endpoint URL and paste it into the action attribute below.
      It will look like: https://formspree.io/f/xxxxxxxx
    -->
    <form
      id="contact-form"
      class="contact-form"
      action="https://formspree.io/f/YOUR_FORM_ID"
      method="POST"
      novalidate
    >
      <div class="form-group">
        <label for="field-name">Name</label>
        <input
          type="text"
          id="field-name"
          name="name"
          placeholder="Your name"
          autocomplete="name"
          required
          aria-required="true"
          aria-describedby="err-name"
        >
        <span class="field-error" id="err-name" role="alert"></span>
      </div>

      <div class="form-group">
        <label for="field-email">Email</label>
        <input
          type="email"
          id="field-email"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          required
          aria-required="true"
          aria-describedby="err-email"
        >
        <span class="field-error" id="err-email" role="alert"></span>
      </div>

      <div class="form-group">
        <label for="field-message">Message</label>
        <textarea
          id="field-message"
          name="message"
          rows="6"
          placeholder="Tell me about your project or just say hello…"
          required
          aria-required="true"
          aria-describedby="err-message"
        ></textarea>
        <span class="field-error" id="err-message" role="alert"></span>
      </div>

      <div id="form-feedback" class="form-feedback" role="status" aria-live="polite"></div>

      <button type="submit" class="btn-send">Send</button>

    </form>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Timeless FTS &mdash; <a href="mailto:bismarck@bisrqe.com">bismarck@bisrqe.com</a></p>
  </footer>
